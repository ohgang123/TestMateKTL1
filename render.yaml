services:
  - type: web
    name: ktl-testmate
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start.sh
    healthCheckPath: /api/dashboard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: KTL_DB_PATH
        value: /var/data/ktl.db
    disk:
      name: ktl-data
      mountPath: /var/data
      sizeGB: 1
